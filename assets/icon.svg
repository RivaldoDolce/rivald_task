<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B0E14"/>
      <stop offset="100%" stop-color="#1A2030"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5B9CFF"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <rect x="32" y="32" width="448" height="448" rx="96" ry="96" fill="url(#bg)"/>
  <rect x="32" y="32" width="448" height="448" rx="96" ry="96"
        fill="none" stroke="#2B3548" stroke-width="2"/>

  <g filter="url(#shadow)">
    <rect x="120" y="160" width="80" height="232" rx="16"
          fill="url(#accent)" opacity="0.95"/>
    <rect x="216" y="120" width="80" height="272" rx="16"
          fill="url(#accent)" opacity="0.80"/>
    <rect x="312" y="200" width="80" height="192" rx="16"
          fill="url(#accent)" opacity="0.65"/>
  </g>

  <circle cx="160" cy="200" r="6" fill="#0B0E14"/>
  <circle cx="256" cy="160" r="6" fill="#0B0E14"/>
  <circle cx="352" cy="240" r="6" fill="#0B0E14"/>

  <circle cx="384" cy="128" r="40" fill="#5B9CFF"/>
  <text x="384" y="142" text-anchor="middle"
        font-family="Inter, Arial, sans-serif" font-size="44"
        font-weight="800" fill="#0B0E14">R</text>
</svg>
